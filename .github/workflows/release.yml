name: Release

# Two trigger paths (mirrors sdk-kotlin/.github/workflows/release.yml):
#   1. push to main — the real release. The `gate` job reads `version`
#      from `package.json` and skips the rest of the workflow if a
#      `v<version>` tag already exists. To cut a new release, bump
#      `version` in package.json and push to main; the workflow
#      publishes to npm and creates the tag.
#   2. workflow_dispatch — manual trigger from the Actions tab on any
#      branch, ALWAYS a dry run: `npm publish --dry-run`, no tag, no
#      GitHub release. There's no opt-out so dispatch can never produce
#      an untagged public release. Real releases must go through
#      push-to-main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# `contents: write` is needed so the publish job can push the version tag
# and create a GitHub release.
# `id-token: write` lets `npm publish --provenance` attach a build-chain
# attestation — npm's analog to Kotlin's GPG-signed Maven artifacts.
permissions:
  contents: write
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # full history so `git rev-parse` can see existing tags
      - id: read
        name: Read package version from package.json
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not read 'version' from package.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"
      - id: check
        name: Skip if this version is already released
        run: |
          # Manual dispatch always proceeds — caller wants to test the workflow
          # itself. Only the push-to-main path enforces the tag-existence gate.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch (dry run): proceeding."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v${{ steps.read.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.read.outputs.version }} already exists. No release needed."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v${{ steps.read.outputs.version }} does not exist. Releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # Don't leave github.token in .git/config across bun install /
          # bun audit / npm publish — a malicious install-time script could
          # otherwise read it and use the repo's write scope. The tag-push
          # step below supplies auth on-demand via http.extraheader.
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Must be >= 1.2 — earlier Bun does not recognize the lockfile's
          # `configVersion` field and reports spurious drift on `--frozen-lockfile`.
          # `bun audit` (used below) also requires Bun 1.2+.
          bun-version: '1.3'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node is here solely to run `npm publish --provenance` with Trusted
          # Publishing — `bun publish` does not yet support npm's OIDC trusted
          # publisher flow. Pinned to satisfy npm 11.5.1's engine requirement
          # (`^20.17.0 || >=22.9.0`); see the upgrade step below.
          node-version: '20.17.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        # Trusted Publishing (OIDC-based auth, no long-lived token) requires
        # npm >= 11.5.1. Node 20 ships with npm 10, so upgrade explicitly.
        # Pinned to the v11.x line — avoids being broken by a future npm
        # major bump while still picking up patch/minor fixes.
        run: npm install -g 'npm@^11.5.1'

      - run: bun install --frozen-lockfile

      - name: Audit known CVEs
        # `bun audit` reads the bun.lock-resolved tree and fails on advisories
        # at or above the given level. Bun doesn't currently offer a registry
        # signature verifier analog to `npm audit signatures`, so signature
        # checking is intentionally out of scope here.
        run: bun audit --audit-level=high

      - name: Verify build
        run: |
          bun run typecheck
          bun run lint
          bun run test
          bun run build

      - name: Publish (npm registry, or --dry-run for workflow_dispatch)
        # Auth uses npm Trusted Publishing: the npm CLI exchanges the GitHub
        # OIDC token (granted by `id-token: write` above) for a short-lived
        # registry credential. No NPM_TOKEN secret is involved, so there is
        # no long-lived automation token bypassing 2FA on the npm account.
        # The package must be configured with this repo + workflow as a
        # trusted publisher on npmjs.com (Package settings → Publishing
        # access → Trusted publisher).
        env:
          # Dispatch is always a dry run; only push-to-main publishes for real.
          # No opt-out — see the on-trigger comment at the top.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: showing what would publish."
            npm publish --dry-run --access public --provenance
          else
            npm publish --access public --provenance
          fi

      - name: Tag the release and create a GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.gate.outputs.version }}"
          # Create the tag ref via the GitHub API rather than `git push`.
          # The checkout above used `persist-credentials: false`, so git has
          # no remote auth configured — and injecting it on-demand via
          # http.extraheader is fragile. `gh api` uses GH_TOKEN directly,
          # which is also the credential `gh release create` already relies
          # on, so this keeps a single auth path for the whole step.
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="${GITHUB_SHA}"
          gh release create "$TAG" --generate-notes
