# .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # CI only reads — never pushes — so don't leave github.token in
          # .git/config where a compromised install-time script could read it.
          persist-credentials: false
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          # Must be >= 1.2 — earlier Bun does not recognize the lockfile's
          # `configVersion` field and reports spurious drift on `--frozen-lockfile`.
          bun-version: '1.3'
      - run: bun install --frozen-lockfile
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Pin Node/npm so `npm audit signatures` runs against a known
          # toolchain — matches the version used in release.yml.
          node-version: '20'
      - name: Audit registry signatures
        # Verifies every installed package's npm registry signature — cheap
        # detection of tampered packages on every PR / push, not just at
        # release time.
        run: npm audit signatures
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
