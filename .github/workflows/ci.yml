# .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # CI only reads — never pushes — so don't leave github.token in
          # .git/config where a compromised install-time script could read it.
          persist-credentials: false
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          # Must be >= 1.2 — earlier Bun does not recognize the lockfile's
          # `configVersion` field and reports spurious drift on `--frozen-lockfile`.
          # `bun audit` (used below) also requires Bun 1.2+.
          bun-version: '1.3'
      - run: bun install --frozen-lockfile
      - name: Audit known CVEs
        # `bun audit` reads the bun.lock-resolved tree and fails on advisories
        # at or above the given level. Bun doesn't currently offer a registry
        # signature verifier analog to `npm audit signatures`, so signature
        # checking is intentionally out of scope here.
        run: bun audit --audit-level=high
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
